name: Test & Publish

on:
  push:
    branches: [main, dev]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: true
    outputs:
      version: ${{ steps.versioning.outputs.version }}
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - run: dotnet test
      - id: versioning
        name: Set publish version unless already on nuget.org
        if: matrix.os == 'ubuntu-latest'
        run: |
          version="$(nbgv get-version -v SimpleVersion)$(nbgv get-version -v PrereleaseVersion)"
          published=$(curl -fsSL https://api.nuget.org/v3-flatcontainer/obsstrawket/index.json | jq -r '.versions[]' || true)
          if ! grep -qix "$version" <<< "$published"; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

  windows-test:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - name: Install OBS Studio
        run: choco install obs-studio --version=32.1.2 --yes --no-progress
      - name: Verify OBS Studio installation
        shell: pwsh
        run: |
          $obs = Join-Path $env:ProgramFiles "obs-studio\bin\64bit\obs64.exe"
          if (-not (Test-Path $obs)) {
            throw "OBS Studio executable not found at $obs"
          }
      - run: dotnet test

  publish:
    needs: [test, windows-test]
    if: needs.test.outputs.version && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # tag push
      id-token: write # nuget.org trusted publishing
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - name: dotnet pack
        run: dotnet pack --include-source --configuration Release -p:Version=${{ needs.test.outputs.version }}
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: jeiea
      - name: Push package
        run: |
          dotnet nuget push ObsStrawket/bin/Release/*.symbols.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
      - name: Tag release
        run: |
          git tag v${{ needs.test.outputs.version }}
          git push origin v${{ needs.test.outputs.version }}
