name: Test & Publish

on:
  push:
    branches: [main, dev]

env:
  HUSKY: 0

jobs:
  ubuntu-test:
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: true
    outputs:
      version: ${{ steps.versioning.outputs.version }}
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - run: dotnet test
      - name: dotnet format style
        shell: pwsh
        run: |
          $output = dotnet format style --verify-no-changes --severity info --no-restore 2>&1 | Out-String
          $root = (Get-Location).Path
          $diagnostics = [regex]::Matches($output, '(?m)^\s*(?<file>.+?\.cs)\((?<line>\d+),(?<col>\d+)\): info (?<id>IDE\d+): (?<msg>.+?) \[')
          foreach ($d in $diagnostics) {
            $rel = [System.IO.Path]::GetRelativePath($root, $d.Groups['file'].Value).Replace('\', '/')
            Write-Output "::warning file=$rel,line=$($d.Groups['line'].Value),col=$($d.Groups['col'].Value)::$($d.Groups['id'].Value): $($d.Groups['msg'].Value)"
          }
          Write-Output "Reported $($diagnostics.Count) code-style diagnostic(s)."
          exit 0
      - id: versioning
        name: Set publish version unless already on nuget.org
        run: |
          version="$(nbgv get-version -v SimpleVersion)$(nbgv get-version -v PrereleaseVersion)"
          published=$(curl -fsSL https://api.nuget.org/v3-flatcontainer/obsstrawket/index.json | jq -r '.versions[]' || true)
          if ! grep -qix "$version" <<< "$published"; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

  windows-test:
    runs-on: windows-latest
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - name: Install OBS Studio
        run: choco install obs-studio --version=32.1.2 --yes --no-progress
      - name: Verify OBS Studio installation
        shell: pwsh
        run: |
          $obs = Join-Path $env:ProgramFiles "obs-studio\bin\64bit\obs64.exe"
          if (-not (Test-Path $obs)) {
            throw "OBS Studio executable not found at $obs"
          }
      - name: Install OBS test vendor plugin
        shell: pwsh
        run: |
          $pluginRoot = Join-Path $env:RUNNER_TEMP "advanced-scene-switcher"
          $archive = Join-Path $env:RUNNER_TEMP "advanced-scene-switcher-1.33.1-windows-x64.zip"
          Invoke-WebRequest `
            "https://github.com/WarmUpTill/SceneSwitcher/releases/download/1.33.1/advanced-scene-switcher-1.33.1-windows-x64.zip" `
            -OutFile $archive
          $actualHash = (Get-FileHash $archive -Algorithm SHA256).Hash
          $expectedHash = "F326D96EF5DBAE9DD12A7DD7255A58F9B75CD89FFC1BE673C3A3C30190400BBC"
          if ($actualHash -ne $expectedHash) {
            throw "Unexpected Advanced Scene Switcher archive hash: $actualHash"
          }
          Expand-Archive $archive $pluginRoot
          "OBSSTRAWKET_TEST_PLUGIN_ROOT=$pluginRoot" >> $env:GITHUB_ENV
      - run: dotnet test
        env:
          OBSSTRAWKET_TEST_ARTIFACTS: ${{ runner.temp }}/obsstrawket-diagnostics
      - name: Upload OBS diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: obs-diagnostics
          path: ${{ runner.temp }}/obsstrawket-diagnostics
          if-no-files-found: ignore
          retention-days: 7

  publish:
    needs: [ubuntu-test, windows-test]
    if: needs.ubuntu-test.outputs.version && github.ref_name == 'main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write # package provenance
      contents: write # tag and GitHub Release
      id-token: write # attestation and nuget.org trusted publishing
    env:
      DOTNET_NOLOGO: true
    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@main
        with:
          dotnet-version: "10.0"
      - name: dotnet pack
        run: dotnet pack --include-source --configuration Release --output artifacts/package -p:Version=${{ needs.ubuntu-test.outputs.version }} -p:PublicRelease=true
      - name: Prepare release notes
        env:
          VERSION: ${{ needs.ubuntu-test.outputs.version }}
        run: |
          awk -v heading="## $VERSION" '
            { sub(/\r$/, "") }
            $0 == heading { found = 1; next }
            found && /^## / { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          cat >> release-notes.md <<EOF

          ### Verify package provenance

          \`\`\`shell
          gh release verify "v$VERSION" --repo "$GITHUB_REPOSITORY"
          \`\`\`
          EOF
      - name: Attest packages
        uses: actions/attest@v4
        with:
          subject-path: artifacts/package/*.nupkg
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.ubuntu-test.outputs.version }}
        run: |
          tag="v$VERSION"
          args=(
            "$tag"
            artifacts/package/*.nupkg
            --draft
            --notes-file release-notes.md
            --target "$GITHUB_SHA"
            --title "$tag"
          )
          if [[ "$VERSION" == *-* ]]; then
            args+=(--prerelease --latest=false)
          fi
          gh release create "${args[@]}"
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: jeiea
      - name: Push package
        run: |
          dotnet nuget push artifacts/package/*.symbols.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.ubuntu-test.outputs.version }}
        run: gh release edit "v$VERSION" --draft=false
